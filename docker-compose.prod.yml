services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    image: skinnypo/3d-portfolio-backend:${IMAGE_TAG:-latest}
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PORT:-3000}:${PORT:-3000}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  strapi:
    image: skinnypo/3d-portfolio-strapi:${IMAGE_TAG:-latest}
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 1337
      DATABASE_CLIENT: postgres
      STRAPI_DATABASE_URL: ${STRAPI_DATABASE_URL}
      APP_KEYS: ${STRAPI_APP_KEYS}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${STRAPI_JWT_SECRET}
      ENCRYPTION_KEY: ${STRAPI_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:1337:1337"
    volumes:
      - /home/deploy/strapi-uploads:/app/strapi/public/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:1337/_health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  frontend-builder:
    image: skinnypo/3d-portfolio-frontend-builder:${IMAGE_TAG:-latest}
    env_file: .env
    depends_on:
      strapi:
        condition: service_healthy
    volumes:
      - /home/deploy/dist:/dist
    restart: "no"

volumes:
  postgres_data:
