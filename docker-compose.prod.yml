services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    image: skinnypo/3d-portfolio-backend:${IMAGE_TAG:-latest}
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PORT:-3000}:${PORT:-3000}"
    volumes:
      - /home/deploy/uploads:/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend-builder:
    image: skinnypo/3d-portfolio-frontend-builder:${IMAGE_TAG:-latest}
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - /home/deploy/dist:/dist
    restart: "no"

volumes:
  postgres_data:
