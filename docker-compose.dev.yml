services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PORT:-3000}:${PORT:-3000}"
    volumes:
      - uploads_dev:/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend-builder:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - frontend_dist_dev:/dist
    restart: "no"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist_dev:/usr/share/nginx/html:ro
      - uploads_dev:/uploads:ro
    depends_on:
      frontend-builder:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data_dev:
  uploads_dev:
  frontend_dist_dev:
