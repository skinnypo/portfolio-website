server {
    listen 80;
    server_name _;

    client_max_body_size 2m;
    server_tokens off;

    gzip on;
    gzip_types text/css application/javascript application/json;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://challenges.cloudflare.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; connect-src 'self' blob: https://challenges.cloudflare.com https://www.google-analytics.com https://analytics.google.com; frame-src https://challenges.cloudflare.com; worker-src blob:; font-src 'self' data: https://fonts.gstatic.com;" always;

    # resolver points at Docker's embedded DNS so upstreams are re-resolved
    # each time instead of being cached at startup (avoids 502 after rebuilds)
    resolver 127.0.0.11 valid=5s;
    set $backend_upstream http://backend:3000;
    set $strapi_upstream http://strapi:1337;

    # Uploaded media now lives in Strapi's media library, served at its own
    # root-relative /uploads path — proxy instead of aliasing the old shared volume.
    location /uploads/ {
        proxy_pass $strapi_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Strapi admin panel + REST API — Strapi always serves these at plain
    # root-relative paths (/admin, /api/...) regardless of its own url config
    # (that config only affects asset base paths baked into the admin HTML,
    # e.g. <script src="/cms/admin/...">), so the /cms prefix is stripped here
    # before proxying. A location-local add_header drops the portfolio site's
    # CSP for this path so it doesn't stack with Strapi's own admin CSP
    # (set by the strapi::security middleware).
    location = /cms {
        return 301 /cms/;
    }

    location /cms/ {
        rewrite ^/cms/(.*)$ /$1 break;
        proxy_pass $strapi_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
