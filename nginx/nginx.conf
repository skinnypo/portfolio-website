server {
    listen 80;
    server_name _;

    client_max_body_size 2m;
    server_tokens off;

    gzip on;
    gzip_types text/css application/javascript application/json;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; connect-src 'self' blob: https://challenges.cloudflare.com https://www.google-analytics.com https://analytics.google.com; frame-src https://challenges.cloudflare.com; worker-src blob:; font-src 'self' data: https://fonts.gstatic.com;" always;

    location /uploads/ {
        alias /uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # resolver points at Docker's embedded DNS so the upstream is re-resolved
    # each time instead of being cached at startup (avoids 502 after backend rebuilds)
    resolver 127.0.0.11 valid=5s;
    set $backend_upstream http://backend:3000;
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
